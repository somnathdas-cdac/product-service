spring.application.name=product-service
server.port=8081

# Updated for Docker Compose Networking
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/micro_service_product_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Som1234567}
spring.jpa.hibernate.ddl-auto=update

# Updated for Docker Eureka Host Connection
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/

# Logging
logging.file.name=logs/app-error.log
logging.level.root=INFO
://level.com.microservice.ecart.product-service=DEBUG
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.max-history=7


