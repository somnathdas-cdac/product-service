name: CI/CD Product Service Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.REGISTRY_USERNAME }}/product-service:latest

  deploy-to-oci:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: SSH into Oracle Cloud VM and Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          # Define working directory path on target VM
          DEPLOY_DIR="~/apps/product-service"
          mkdir -p $DEPLOY_DIR
          cd $DEPLOY_DIR

          # Export the environment variable for docker-compose configuration dynamically
          export REGISTRY_USERNAME="${{ secrets.REGISTRY_USERNAME }}"

          # Authenticate Docker daemon on target instance
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

          # Pull newest image build
          docker pull ${{ secrets.REGISTRY_USERNAME }}/product-service:latest

          # Re-launch services using docker-compose
          # Assumes docker-compose.yml is already present in your $DEPLOY_DIR
          docker-compose down || true
          docker-compose up -d

