  deploy-to-oci:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    # 1. Bring the repository files into this runner environment
    - name: Checkout Repository code
      uses: actions/checkout@v4

    # 2. Transfer docker-compose.yml directly to the destination directory
    - name: Copy docker-compose.yml to Oracle VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        source: "docker-compose.yml"
        target: "~/apps/product-service/"
        strip_components: 0

    # 3. Connect via SSH to configure variables, authenticate, and launch containers
    - name: SSH into Oracle Cloud VM and Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          # Ensure working directory path exists and navigate into it
          mkdir -p ~/apps/product-service
          cd ~/apps/product-service

          # Save the environment variable to a file so docker compose can read it
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" > .env

          # Authenticate Docker daemon on target instance
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

          # Pull newest image build
          docker pull ${{ secrets.REGISTRY_USERNAME }}/product-service:latest

          # Re-launch services cleanly using docker compose
          docker compose down || true
          docker compose up -d
